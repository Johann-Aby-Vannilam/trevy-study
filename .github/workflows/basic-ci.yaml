name: 01-basic-trivy 
on: 
  push: 
    branches: [ main ]

jobs: 
  scan: 
    runs-on: ubuntu-latest 
    steps: 
    - uses: actions/checkout@v3 
      name: Checkout code
    - name: Build image 
      run: docker build -t myapp:${{ github.sha }} . 
    - name: Run Trivy 
      uses: aquasecurity/trivy-action@master 
      with: 
        image-ref: myapp:${{ github.sha }} 
        severity: CRITICAL,HIGH 
        exit-code: 1